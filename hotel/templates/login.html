<!doctype html>
<html lang="en">
  {% load static %}
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Login - Arthy Hotel</title>
    <link rel="icon" type="image/png" href="{% static 'photos/Logo.png' %}" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/static/style.css" />
  </head>
  <body class="login-page">
    <div class="login-container">
      <img
        src="{% static 'photos/Logo.png' %}"
        alt="Hotel Logo"
        width="120"
        class="mb-4"
      />
      <h2 class="mb-4">Login</h2>

      <form method="POST">
        {% csrf_token %}
        <div class="mb-3 text-start">
          <label for="username" class="form-label">Username</label>
          <div class="input-group">{{ form.username }}</div>
        </div>
        <div class="mb-4 text-start">
          <label for="password" class="form-label">Password</label>
          <div class="input-group">{{ form.password }}</div>
        </div>
        {% if messages %}
        <div class="mb-3 center">
          {% for message in messages %}
          <div class="alert alert-{{ message.tags }}" role="alert">
            {{ message }}
          </div>
          {% endfor %}
        </div>
        {% endif %}
        <button type="submit" class="btn btn-warning w-100 mb-3">
          Sign In
        </button>
      </form>
      <p class="small">
        Don't have an account? <a href="{% url 'register' %}">Register here</a>
      </p>
      <p class="small">
        <a href="{% url 'customer_dashboard' %}">Back to Home</a>
      </p>
    </div>
  </body>
</html>
